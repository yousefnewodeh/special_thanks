<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You Strawbarry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rock+Salt&display=swap');

  :root {
    --wall: #1c1c1c;
    --wall-2: #2a2a2a;
    --spray-pink: #ff2d78;
    --spray-orange: #ff8a00;
    --spray-yellow: #ffe600;
    --spray-green: #39ff14;
    --spray-blue: #00d4ff;
    --drip: rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--wall);
  }

  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Permanent Marker', cursive;
    cursor: pointer;
  }

  /* Brick / concrete wall texture */
  .wall {
    position: absolute;
    inset: 0;
    background-color: var(--wall);
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 42px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 90px),
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 25%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04) 0%, transparent 30%),
      radial-gradient(circle at 50% 90%, rgba(255,255,255,0.03) 0%, transparent 40%);
  }

  .grime {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 15%, transparent 80%, rgba(0,0,0,0.6) 100%),
      linear-gradient(90deg, rgba(0,0,0,0.4) 0%, transparent 12%, transparent 88%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
  }

  .scene {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px;
    max-width: 95vw;
  }

  .tag-wrap {
    position: relative;
    display: inline-block;
  }

  h1 {
    margin: 0;
    line-height: 1.05;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    filter: url(#spray-edge);
  }

  .line1, .line3 {
    font-size: clamp(2.2rem, 9vw, 6rem);
    color: var(--spray-pink);
    -webkit-text-stroke: 2px #ffffff22;
    text-shadow:
      3px 3px 0 var(--spray-orange),
      6px 6px 0 rgba(0,0,0,0.55),
      0 0 25px rgba(255,45,120,0.6);
    transform: rotate(-2deg);
    display: inline-block;
  }

  .line2 {
    font-family: 'Rock Salt', cursive;
    font-size: clamp(3rem, 13vw, 8.5rem);
    color: var(--spray-yellow);
    text-shadow:
      3px 3px 0 var(--spray-green),
      6px 6px 0 var(--spray-blue),
      9px 9px 0 rgba(0,0,0,0.5),
      0 0 35px rgba(255,230,0,0.55);
    transform: rotate(1.5deg);
    display: inline-block;
    margin: 0.05em 0;
    position: relative;
  }

  .misspell-note {
    display: block;
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(0.9rem, 2.2vw, 1.3rem);
    color: var(--spray-green);
    margin-top: 8px;
    opacity: 0.85;
    transform: rotate(-3deg);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  }

  .arrow-doodle {
    position: absolute;
    width: 70px;
    top: -30px;
    left: -60px;
    transform: rotate(35deg);
    opacity: 0.9;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
  }

  .drip {
    position: absolute;
    bottom: -22px;
    width: 10px;
    border-radius: 0 0 6px 6px;
    animation: dripgrow 3.5s ease-in-out infinite;
    transform-origin: top center;
  }

  .heart-doodle {
    position: absolute;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    animation: floatHeart 3s ease-in-out infinite;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
  }

  .star-doodle {
    position: absolute;
    color: var(--spray-blue);
    font-size: clamp(1.2rem, 3vw, 2rem);
    animation: spin 6s linear infinite;
  }

  .tag-signature {
    margin-top: 30px;
    font-family: 'Rock Salt', cursive;
    font-size: clamp(0.8rem, 2vw, 1.1rem);
    color: rgba(255,255,255,0.55);
    transform: rotate(-1.5deg);
  }

  .can {
    position: fixed;
    width: 26px;
    height: 60px;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.15s;
  }

  @keyframes dripgrow {
    0%, 100% { height: 20px; opacity: 0.85; }
    50% { height: 60px; opacity: 0.55; }
  }

  @keyframes floatHeart {
    0%, 100% { transform: translateY(0) rotate(-8deg); }
    50% { transform: translateY(-14px) rotate(8deg); }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 22%, 24%, 55% { opacity: 0.7; }
  }

  .tag-wrap { animation: flicker 6s infinite; }

  .hint {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(0.75rem, 1.8vw, 1rem);
    z-index: 2;
    letter-spacing: 1px;
  }

  @media (prefers-reduced-motion: reduce) {
    .tag-wrap, .drip, .heart-doodle, .star-doodle { animation: none !important; }
  }
</style>
</head>
<body>

<div class="wall"></div>
<div class="grime"></div>

<svg width="0" height="0" style="position:absolute">
  <filter id="spray-edge" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" seed="7"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5"/>
  </filter>
</svg>

<div class="scene">
  <div class="tag-wrap" id="tagWrap">

    <svg class="arrow-doodle" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
      <path d="M5,30 Q40,5 90,25" stroke="#00d4ff" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M75,15 L92,25 L78,38" stroke="#00d4ff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <span class="star-doodle" style="top:-10px; right:-30px;">★</span>
    <span class="heart-doodle" style="top:10px; right:-45px; animation-delay:0.5s;">🍓</span>

    <h1>
      <span class="line1">THANK</span><br>
      <span class="line2">YOU</span><br>
      <span class="line3">STRAWBARRY</span>
    </h1>

    <span class="misspell-note">(yeah I spelled it wrong on purpose, don't @ me)</span>

    <span class="heart-doodle" style="bottom:-10px; left:-40px; animation-delay:1s;">💕</span>
    <span class="star-doodle" style="bottom:0px; left:-20px; animation-delay:2s;">✦</span>

    <div class="drip" style="left: 8%; background: var(--spray-pink);"></div>
    <div class="drip" style="left: 30%; background: var(--spray-yellow); animation-delay: 0.7s;"></div>
    <div class="drip" style="left: 55%; background: var(--spray-green); animation-delay: 1.4s;"></div>
    <div class="drip" style="left: 78%; background: var(--spray-blue); animation-delay: 2.1s;"></div>
  </div>

  <div class="tag-signature">— tagged fresh, ${new Date().getFullYear ? '' : ''} 100% berry-approved 🍓</div>
</div>

<div class="hint">click the wall for more spray-can love</div>

<canvas id="spray-canvas" style="position:fixed; inset:0; z-index:1; pointer-events:none;"></canvas>

<script>
  const canvas = document.getElementById('spray-canvas');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const colors = ['#ff2d78', '#ff8a00', '#ffe600', '#39ff14', '#00d4ff'];

  function sprayBurst(x, y) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.random() * 55;
      const px = x + Math.cos(angle) * radius;
      const py = y + Math.sin(angle) * radius;
      const size = Math.random() * 2.5 + 0.5;
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = Math.random() * 0.5 + 0.3;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  document.body.addEventListener('click', (e) => {
    sprayBurst(e.clientX, e.clientY);
  });

  // Little welcome burst so the wall doesn't look untouched
  setTimeout(() => {
    sprayBurst(window.innerWidth * 0.15, window.innerHeight * 0.2);
    sprayBurst(window.innerWidth * 0.85, window.innerHeight * 0.8);
  }, 600);
</script>

</body>
</html>
